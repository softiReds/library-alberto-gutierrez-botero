<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión | Panel Admin — Biblioteca Alberto Gutiérrez Botero</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/logo/logo-biblioteca.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">

  <main class="login-layout">

    <!-- ============ PANEL VISUAL (IZQUIERDA) ============ -->
    <section class="login-visual" aria-hidden="true">
      <div class="login-visual__top">
        <div class="login-visual__brand">
          <img src="assets/logo/logo-fundacion.png" alt="Fundación Servimos">
        </div>

        <span class="login-visual__rule"></span>

        <h1 class="login-visual__welcome">
          Bienvenida de nuevo<br>
          <em>Coordinadora</em>
        </h1>
      </div>

      <figure class="login-visual__media">
        <img src="assets/resources/image.png" alt="">
      </figure>

      <svg class="login-visual__curve" viewBox="0 0 100 900" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M100,0 L70,0
                 C 55,120 30,180 34,300
                 C 38,420 78,440 76,560
                 C 74,700 48,780 45,900
                 L100,900 Z"
              fill="#F4F1F3"/>
      </svg>
    </section>

    <!-- ============ PANEL DE FORMULARIO ============ -->
    <section class="login-panel">
      <header class="login-panel__brand">
        <a href="reporte.html" class="login-panel__brand-link" aria-label="Ir a reportes">
          <img src="assets/logo/logo-biblioteca.png" alt="">
        </a>
        <div class="login-panel__brand-text">
          <span>Biblioteca</span>
          <strong>Alberto Gutiérrez Botero</strong>
        </div>
      </header>

      <div class="login-card">
        <h2 class="login-card__title">Iniciar sesión</h2>
        <span class="login-card__rule"></span>

        <form id="loginForm" class="login-form" novalidate>

          <div class="field">
            <label class="field__label" for="username">Usuario</label>
            <div class="field__control">
              <svg class="field__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c1.5-3.5 4.5-5 8-5s6.5 1.5 8 5"/>
              </svg>
              <input type="text" id="username" name="username" placeholder="Ingresa tu usuario"
                     autocomplete="username" required autofocus>
            </div>
          </div>

          <div class="field">
            <label class="field__label" for="password">Contraseña</label>
            <div class="field__control">
              <svg class="field__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="5" y="11" width="14" height="9" rx="2"/>
                <path d="M8 11V8a4 4 0 0 1 8 0v3"/>
              </svg>
              <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña"
                     autocomplete="current-password" required>
              <button type="button" class="field__toggle" id="togglePassword"
                      aria-label="Mostrar contraseña" aria-pressed="false">
                <svg class="field__toggle-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="field__toggle-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
                  <path d="M2 12s3.5-7 10-7c2.1 0 3.9.73 5.4 1.7M22 12s-3.5 7-10 7c-2.1 0-3.9-.73-5.4-1.7"/>
                  <path d="M4 4l16 16"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Mensaje de error / estado -->
          <p class="login-form__alert" id="loginAlert" role="alert" hidden></p>

          <div class="login-form__row">
            <label class="checkbox">
              <input type="checkbox" id="rememberMe" checked>
              <span class="checkbox__box" aria-hidden="true">
                <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6.5 4.8 9 10 3.5"/></svg>
              </span>
              <span>Recordarme</span>
            </label>
          </div>

          <button type="submit" class="btn btn--primary login-form__submit" id="submitBtn">
            <span class="login-form__submit-label">Iniciar sesión</span>
            <span class="login-form__spinner" aria-hidden="true" hidden></span>
          </button>
        </form>
      </div>

      <footer class="login-panel__footer">
        © 2024 Fundación Servimos. Todos los derechos reservados.
      </footer>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
